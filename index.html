<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VoiceIQ"/>
<meta name="theme-color" content="#07070f"/>
<title>VoiceIQ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:#07070f;color:#f0f0f8;min-height:100%;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  overscroll-behavior:none;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
input,button,textarea{font-family:inherit}

@keyframes b1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,55px)}}
@keyframes b2{0%,100%{transform:translate(0,0)}50%{transform:translate(-45px,30px)}}
@keyframes b3{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-38px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(255,75,75,.5),0 0 24px rgba(255,75,75,.3)}50%{box-shadow:0 0 0 18px rgba(255,75,75,0),0 0 48px rgba(255,75,75,.55)}}
@keyframes ring{0%{opacity:.5;transform:translate(-50%,-50%) scale(.88)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.75)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes prog{0%{left:-55%;width:55%}100%{left:110%;width:55%}}
@keyframes sheetUp{from{transform:translateY(102%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* Layout */
.app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}

/* Blobs */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px)}
.ba{width:300px;height:300px;top:-90px;left:-70px;background:#1d4ed8;opacity:.11;animation:b1 22s ease-in-out infinite}
.bb{width:250px;height:250px;top:38%;right:-80px;background:#6d28d9;opacity:.09;animation:b2 26s ease-in-out infinite}
.bc{width:190px;height:190px;bottom:20%;left:5%;background:#065f46;opacity:.1;animation:b3 19s ease-in-out infinite}

/* Header */
.hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;background:rgba(7,7,15,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;color:#fff}
.logo-em{background:linear-gradient(135deg,#38bdf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-badge{padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:11px;font-weight:600;color:#44445a}

/* Scroll */
.scroll{position:relative;z-index:1;padding:12px 14px 110px;display:flex;flex-direction:column;gap:12px}

/* Recorder */
.rec-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:20px 18px 18px;position:relative;overflow:hidden}
.rec-card::before{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% -10%,rgba(56,189,248,.06),transparent);pointer-events:none}

/* Live */
.live{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(255,75,75,.12);font-size:11px;font-weight:700;letter-spacing:.8px;color:#ff4b4b;text-transform:uppercase;margin-bottom:14px;opacity:0;transition:opacity .3s;height:24px}
.live.on{opacity:1}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ff4b4b;flex-shrink:0;animation:blink 1s infinite}

/* Transcribing badge */
.transcribing-badge{display:none;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.2);font-size:12px;font-weight:600;color:#38bdf8;margin-bottom:10px}
.transcribing-badge.on{display:flex}
.tb-dot{width:7px;height:7px;border-radius:50%;background:#38bdf8;animation:blink .8s infinite}

/* Live transcript preview */
.live-transcript{display:none;background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.15);border-radius:12px;padding:10px 12px;font-size:13px;color:#a0d4f0;line-height:1.6;margin-bottom:12px;max-height:80px;overflow:hidden;text-overflow:ellipsis;min-height:40px}
.live-transcript.on{display:block}

/* Waveform */
.wf{height:52px;display:flex;align-items:center;justify-content:center;gap:2.5px;margin-bottom:14px}
.wb{width:3px;border-radius:2px;background:rgba(255,255,255,.13);transition:height .07s ease}
.wb.a{background:linear-gradient(to top,#38bdf8,#34d399)}

/* Timer */
.timer{font-family:‘Courier New’,Courier,monospace;font-size:48px;font-weight:700;letter-spacing:-2px;text-align:center;color:#f0f0f8;transition:color .3s;margin-bottom:4px}
.timer.rec{color:#ff4b4b}
.t-hint{text-align:center;font-size:11px;color:#40405a;margin-bottom:22px;font-weight:500}

/* Mic */
.mic-wrap{display:flex;align-items:center;justify-content:center;height:88px;position:relative;margin-bottom:18px}
.ring{position:absolute;width:90px;height:90px;border-radius:50%;border:1.5px solid rgba(56,189,248,.2);top:50%;left:50%;opacity:0;animation:ring 2.6s ease-out infinite}
.ring2{animation-delay:.7s}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;z-index:1;outline:none;-webkit-tap-highlight-color:transparent;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.mic-btn:active{transform:scale(.9)!important}
.mic-idle{background:linear-gradient(145deg,#18182c,#22223a);border:1.5px solid rgba(255,255,255,.12);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.mic-rec{background:linear-gradient(145deg,#3d0a0a,#ff4b4b);animation:rp 1.9s ease-in-out infinite}
.mic-paused{background:linear-gradient(145deg,#2a1e00,#f59e0b);box-shadow:0 0 26px rgba(245,158,11,.28)}

/* Controls */
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.ctrl{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:#f0f0f8;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:opacity .2s,transform .15s}
.ctrl:disabled{opacity:.2;cursor:not-allowed}
.ctrl:not(:disabled):active{transform:scale(.88)}

/* Footer */
.rec-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.chip-idle{background:rgba(255,255,255,.04);color:#40405a}
.chip-rec{background:rgba(255,75,75,.12);color:#ff4b4b}
.chip-pause{background:rgba(245,158,11,.1);color:#f59e0b}
.rec-sub{font-size:11px;color:#40405a}

/* Section */
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:#40405a}
.sec-right{display:flex;align-items:center;gap:8px}
.btn-delall{padding:4px 11px;border-radius:20px;border:none;background:rgba(255,75,75,.07);color:#ff4b4b;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-delall:active{background:rgba(255,75,75,.18)}
.cnt{font-family:monospace;font-size:11px;color:#40405a}

/* Rec items */
.ri{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:13px 13px 13px 17px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:border-color .2s;margin-bottom:8px}
.ri:active{opacity:.82}
.ri.sel{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.03)}
.ri-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:linear-gradient(to bottom,#38bdf8,#34d399)}
.ri-stripe.done{background:linear-gradient(to bottom,#34d399,#38bdf8)}
.ri-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px}
.ri-name{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-acts{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ri-dur{font-family:monospace;font-size:11px;color:#38bdf8}
.ic-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.ic-btn:active{transform:scale(.82)}
.ic-rename{background:rgba(56,189,248,.1);color:#38bdf8}
.ic-del{background:rgba(255,75,75,.1);color:#ff4b4b}
.ri-date{font-size:11px;color:#40405a;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.tg{background:rgba(52,211,153,.08);color:#34d399}
.tb{background:rgba(56,189,248,.1);color:#38bdf8}
.ty{background:rgba(245,158,11,.08);color:#f59e0b}
.tp{background:rgba(167,139,250,.1);color:#a78bfa}

/* Empty */
.empty{text-align:center;padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{width:64px;height:64px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:4px}
.empty-title{font-size:15px;font-weight:700}
.empty-sub{font-size:13px;color:#7070a0;line-height:1.6;max-width:260px}

/* ── SHEET ── */
.sheet-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.sheet{width:100%;max-width:430px;max-height:92dvh;background:linear-gradient(to bottom,#131320,#0b0b18);border-radius:26px 26px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;display:flex;flex-direction:column;animation:sheetUp .3s cubic-bezier(.34,1.08,.64,1);overflow:hidden}
.sh-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.14);margin:13px auto 0;flex-shrink:0}
.sh-head{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;background:rgba(19,19,32,.95);backdrop-filter:blur(20px)}
.sh-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sh-sub{font-size:11px;color:#7070a0;margin-top:2px;font-family:monospace}
.btn-x{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#7070a0;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.sh-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:0}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px}
.spinner{width:44px;height:44px;border-radius:50%;border:2.5px solid rgba(255,255,255,.1);border-top-color:#38bdf8;animation:spin .7s linear infinite}
.load-step{font-size:14px;font-weight:600;color:#8080a8;text-align:center;line-height:1.6}
.load-sub{font-size:12px;color:#40405a;text-align:center}
.prog-wrap{width:180px;height:3px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.prog-wrap::after{content:’’;position:absolute;top:0;height:100%;background:linear-gradient(to right,#38bdf8,#34d399);border-radius:2px;animation:prog 1.8s ease-in-out infinite}

/* ── ACCORDION — fixed, no overlap ── */
.ac{
border:1px solid rgba(255,255,255,.07);
border-radius:14px;
overflow:hidden;
margin-bottom:8px;
background:rgba(255,255,255,.025);
/* do NOT use flexbox here */
}
.ac-head{
display:flex;align-items:center;gap:10px;
padding:12px 14px;
cursor:pointer;user-select:none;
-webkit-tap-highlight-color:transparent;
width:100%;
}
.ac-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ico-b{background:rgba(56,189,248,.12)}
.ico-g{background:rgba(52,211,153,.1)}
.ico-y{background:rgba(245,158,11,.1)}
.ico-p{background:rgba(167,139,250,.12)}
.ico-r{background:rgba(255,75,75,.1)}
.ac-lbl{flex:1;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#7070a0}
.ac-chev{font-size:10px;color:#40405a;flex-shrink:0;line-height:1;display:inline-block;transition:transform .25s ease}
/* body is block, hidden via display:none — no height tricks that cause overlap */
.ac-body{
display:block;
padding:0 14px 14px;
/* border-top only when visible */
border-top:1px solid rgba(255,255,255,.05);
}
.ac-body.closed{display:none}

/* Transcript */
.transcript-box{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:13px;font-size:13px;line-height:1.8;color:#c8c8e0;max-height:160px;overflow-y:auto;white-space:pre-wrap}

/* Summary */
.sum-text{font-size:13.5px;line-height:1.75;color:#d0d0e8;margin-bottom:11px}
.kw-row{display:flex;flex-wrap:wrap;gap:5px}
.kw{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(56,189,248,.1);color:#38bdf8}

/* Sentiment */
.sent-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.sent-desc{font-size:13px;color:#8080a8;margin-bottom:6px}
.sent-mots{display:flex;flex-wrap:wrap;gap:4px}
.sent-pct{font-family:monospace;font-size:18px;font-weight:700;flex-shrink:0}
.sent-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.sent-fill{height:100%;border-radius:3px}

/* Bullets */
.blist{list-style:none}
.blist li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;line-height:1.65;color:#d0d0e8}
.blist li:last-child{border-bottom:none;padding-bottom:0}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}

/* Decisions */
.dec-list{display:flex;flex-direction:column;gap:7px}
.dec-item{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:11px;display:flex;gap:10px;align-items:flex-start}
.dec-num{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#38bdf8,#34d399);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.dec-txt{font-size:13px;line-height:1.6;color:#d0d0e8}

/* Audio player */
.audio-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 14px;margin-bottom:8px}
.btn-pp{width:32px;height:32px;border-radius:50%;border:none;background:#38bdf8;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.a-prog{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.a-fill{height:100%;background:#38bdf8;border-radius:2px;transition:width .2s}
.a-time{font-family:monospace;font-size:10px;color:#40405a;white-space:nowrap}

/* Analyse btn */
.btn-analyse{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#38bdf8,#34d399);color:#fff;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 18px rgba(56,189,248,.3)}
.btn-analyse:active{opacity:.9;transform:scale(.98)}

/* ── DIALOGS ── */
.dlg-bg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.dlg{width:100%;max-width:290px;background:#14142a;border:1px solid rgba(255,255,255,.1);border-radius:22px;overflow:hidden;animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
.dlg-body{padding:22px 18px 14px;text-align:center}
.dlg-icon{font-size:34px;margin-bottom:10px}
.dlg-title{font-size:16px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.dlg-desc{font-size:13px;color:#8080a8;line-height:1.55}
.dlg-desc b{color:#f0f0f8}
.dlg-acts{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.dlg-btn{flex:1;padding:15px;border:none;background:transparent;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.dlg-btn:active{background:rgba(255,255,255,.05)}
.dlg-cancel{color:#7070a0;border-right:1px solid rgba(255,255,255,.08)}
.dlg-danger{color:#ff4b4b;font-weight:700}
.dlg-ok{color:#38bdf8;font-weight:700}
.rename-inp{width:100%;margin-top:14px;padding:12px;background:rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.14);border-radius:12px;color:#f0f0f8;font-size:15px;font-weight:600;outline:none;-webkit-appearance:none}
.rename-inp:focus{border-color:#38bdf8}
.rename-inp::placeholder{color:#40405a}
</style>

</head>

      <button class="dlg-btn dlg-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="dlg-btn dlg-danger" id="confOk">Apagar</button>
    </div>
  </div>
</div>

<!-- Rename -->

<div class="dlg-bg" id="renameDlg" style="display:none" onclick="if(event.target===this)closeRename()">
  <div class="dlg">
    <div class="dlg-body">
      <div class="dlg-icon">✏️</div>
      <div class="dlg-title">Renomear</div>
      <input class="rename-inp" id="renameInp" type="text" placeholder="Nome da gravação" maxlength="60"/>
    </div>
    <div class="dlg-acts">
      <button class="dlg-btn dlg-cancel" onclick="closeRename()">Cancelar</button>
      <button class="dlg-btn dlg-ok"     onclick="applyRename()">Salvar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const MODEL = 'claude-sonnet-4-20250514';

// ── State ─────────────────────────────────────────────────────────────────────
let recState = 'idle';
let elapsed  = 0;
let timerInt = null;
let waveInt  = null;
let mediaRec = null;
let chunks   = [];
let analyserNode = null;
let recordings   = [];
let selectedId   = null;
let confirmFn    = null;
let renameId     = null;
let audioEl      = null;
let audioTick    = null;

// Speech Recognition for live transcription
let recognition      = null;
let fullTranscript   = '';
let interimText      = '';

// ── Waveform ──────────────────────────────────────────────────────────────────
const WF = document.getElementById('wf');
const N  = 30;
for (let i = 0; i < N; i++) {
  const b = document.createElement('div');
  b.className = 'wb';
  b.style.height = '4px';
  WF.appendChild(b);
}
const bars = WF.querySelectorAll('.wb');

function animWave() {
  if (analyserNode) {
    const d = new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(d);
    bars.forEach((b, i) => {
      const v = d[Math.floor(i * d.length / N)] || 0;
      b.style.height = Math.max(4, Math.min(50, (v / 255) * 50)) + 'px';
    });
  } else {
    const t = Date.now() / 250;
    bars.forEach((b, i) => {
      const h = 20 + Math.sin(t + i * .42) * 15 + Math.sin(t * 1.7 + i * .3) * 7;
      b.style.height = Math.max(4, Math.min(50, h)) + 'px';
    });
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');
const fmtT = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return h?`${pad(h)}:${pad(m)}:${pad(sc)}`:`${pad(m)}:${pad(sc)}`; };
const fmtD = ts => new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
const sentC = n => n>=70?'#34d399':n>=45?'#f59e0b':'#ff4b4b';
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const parseJ = r => { try{return JSON.parse(r.replace(/```json|```/g,'').trim());}catch{return null;} };

// ── UI refresh ────────────────────────────────────────────────────────────────
function refreshUI() {
  const btn   = document.getElementById('micBtn');
  const pb    = document.getElementById('pauseBtn');
  const sb    = document.getElementById('stopBtn');
  const chip  = document.getElementById('chip');
  const hint  = document.getElementById('hint');
  const badge = document.getElementById('liveBadge');
  const r1    = document.getElementById('ring1');
  const r2    = document.getElementById('ring2');
  const isRec = recState==='recording', isPause=recState==='paused', isIdle=recState==='idle';

  btn.className = 'mic-btn ' + (isIdle?'mic-idle':isRec?'mic-rec':'mic-paused');
  btn.textContent = isIdle ? '🎙️' : '⏹';
  pb.disabled = isIdle; sb.disabled = isIdle;
  pb.textContent = isPause ? '▶' : '⏸';
  badge.className = 'live' + (isRec?' on':'');
  [r1,r2].forEach(r=>r.style.opacity=isRec?'':'0');
  chip.className = 'chip '+(isIdle?'chip-idle':isRec?'chip-rec':'chip-pause');
  chip.textContent = isIdle?'Aguardando':isRec?'● REC':'⏸ Pausado';
  hint.textContent = isIdle?'Toque no botão para iniciar':isRec?'Sem limite de tempo':'Pausado — toque ▶ para continuar';
  bars.forEach(b=>b.classList.toggle('a',isRec));
}

// ── Speech Recognition (live transcript) ─────────────────────────────────────
function startSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return; // not supported — will fall back to Claude

  fullTranscript = '';
  interimText    = '';

  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        fullTranscript += t + ' ';
      } else {
        interim += t;
      }
    }
    interimText = interim;
    // Show live preview
    const preview = (fullTranscript + interim).trim();
    const box = document.getElementById('liveTranscript');
    if (box && preview) {
      box.textContent = preview.slice(-200); // show last 200 chars
      box.classList.add('on');
    }
  };

  recognition.onerror = e => {
    console.warn('SR error:', e.error);
    // Restart on non-fatal errors
    if (recState === 'recording' && e.error !== 'aborted') {
      try { recognition.start(); } catch(_) {}
    }
  };

  recognition.onend = () => {
    // Keep restarting while recording
    if (recState === 'recording') {
      try { recognition.start(); } catch(_) {}
    }
  };

  try {
    recognition.start();
    document.getElementById('transcribingBadge').classList.add('on');
  } catch(e) {
    console.warn('SR start failed:', e);
  }
}

function stopSpeechRecognition() {
  document.getElementById('transcribingBadge').classList.remove('on');
  document.getElementById('liveTranscript').classList.remove('on');
  document.getElementById('liveTranscript').textContent = '';
  if (recognition) {
    try { recognition.stop(); } catch(_) {}
    recognition = null;
  }
}

// ── Recording ─────────────────────────────────────────────────────────────────
async function mainPress() {
  if (recState === 'idle') await startRec();
  else doStop();
}

async function startRec() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:true, noiseSuppression:true, sampleRate:44100 }
    });
  } catch(e) {
    alert('⚠️ Permissão de microfone necessária.\n\nVá em Configurações → Safari → Microfone e permita o acesso.');
    return;
  }

  // Analyser for waveform
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const an  = ctx.createAnalyser(); an.fftSize=512;
    src.connect(an); analyserNode=an;
  } catch(_) {}

  // MediaRecorder
  const mime = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','']
    .find(m => !m || MediaRecorder.isTypeSupported(m));
  mediaRec = new MediaRecorder(stream, mime ? {mimeType:mime} : {});
  chunks = [];
  mediaRec.ondataavailable = e => { if(e.data?.size>0) chunks.push(e.data); };
  mediaRec.start(300);

  elapsed = 0;
  document.getElementById('timer').textContent = fmtT(0);
  recState = 'recording';
  refreshUI();

  timerInt = setInterval(()=>{ elapsed++; const el=document.getElementById('timer'); el.textContent=fmtT(elapsed); el.className='timer rec'; }, 1000);
  waveInt  = setInterval(animWave, 70);

  // Start live speech-to-text
  startSpeechRecognition();
}

function togglePause() {
  if (recState==='recording') {
    try{if(mediaRec?.state==='recording')mediaRec.pause();}catch(_){}
    try{if(recognition)recognition.stop();}catch(_){}
    clearInterval(timerInt); clearInterval(waveInt);
    bars.forEach(b=>{b.style.height='4px';b.classList.remove('a');});
    recState='paused';
  } else {
    try{if(mediaRec?.state==='paused')mediaRec.resume();}catch(_){}
    timerInt=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=fmtT(elapsed);},1000);
    waveInt=setInterval(animWave,70);
    // Restart recognition
    startSpeechRecognition();
    recState='recording';
  }
  refreshUI();
}

function doStop() {
  const dur = elapsed;
  const capturedTranscript = (fullTranscript + ' ' + interimText).trim();

  clearInterval(timerInt); clearInterval(waveInt);
  bars.forEach(b=>{b.style.height='4px';b.classList.remove('a');});
  stopSpeechRecognition();
  analyserNode = null;
  recState = 'idle'; elapsed = 0;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = fmtT(0); timerEl.className = 'timer';
  refreshUI();

  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.onstop = () => {
      const blob = new Blob(chunks, {type: mediaRec.mimeType||'audio/webm'});
      const url  = URL.createObjectURL(blob);
      addRec({dur, blob, url, transcript: capturedTranscript||null});
      mediaRec.stream?.getTracks().forEach(t=>t.stop());
      mediaRec = null;
    };
    mediaRec.stop();
  } else {
    addRec({dur, blob:null, url:null, transcript: capturedTranscript||null});
  }
}

function addRec({dur, blob, url, transcript}) {
  recordings.unshift({
    id: Date.now(),
    name: `Gravação ${recordings.length+1}`,
    ts: Date.now(),
    duration: dur,
    blob, url,
    transcript: transcript||null,
    analysis: null
  });
  renderList();
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('recList');
  const cnt  = document.getElementById('cnt');
  const dab  = document.getElementById('delAllBtn');
  cnt.textContent = pad(recordings.length);
  dab.style.display = recordings.length ? '' : 'none';

  if (!recordings.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🎙️</div><div class="empty-title">Nenhuma gravação</div><div class="empty-sub">Grave reuniões ou conversas e receba análises completas com IA.</div></div>`;
    return;
  }
  list.innerHTML = recordings.map(r=>`
    <div class="ri${selectedId===r.id?' sel':''}" onclick="openRec(${r.id})">
      <div class="ri-stripe${r.analysis?' done':''}"></div>
      <div class="ri-top">
        <div class="ri-name">${esc(r.name)}</div>
        <div class="ri-acts">
          <span class="ri-dur">${fmtT(r.duration)}</span>
          <button class="ic-btn ic-rename" onclick="event.stopPropagation();openRename(${r.id})">✏️</button>
          <button class="ic-btn ic-del"    onclick="event.stopPropagation();confirmDel(${r.id})">🗑️</button>
        </div>
      </div>
      <div class="ri-date">${fmtD(r.ts)}</div>
      <div class="tags">
        ${r.analysis?'<span class="tag tg">✓ Analisado</span>':''}
        ${r.transcript&&!r.analysis?'<span class="tag tb">📝 Transcrito</span>':''}
        ${!r.transcript?'<span class="tag ty">Toque para analisar</span>':''}
        <span class="tag tp">🎙 ${fmtT(r.duration)}</span>
        ${r.analysis?.sentimento?`<span class="tag tb">${r.analysis.sentimento.nivel>=70?'😊':r.analysis.sentimento.nivel>=45?'😐':'😟'} ${r.analysis.sentimento.nivel}%</span>`:''}
      </div>
    </div>`).join('');
}

// ── Open & analyse ────────────────────────────────────────────────────────────
async function openRec(id) {
  const rec = recordings.find(r=>r.id===id);
  if (!rec) return;
  selectedId = id; renderList();
  document.getElementById('shTitle').textContent = rec.name;
  document.getElementById('shSub').textContent   = `${fmtD(rec.ts)} · ${fmtT(rec.duration)}`;
  document.getElementById('sheetBg').style.display = 'flex';
  if (rec.analysis) { renderAnalysis(rec); return; }

  // ── Step 1: get transcript ────────────────────────────────────────────────
  showLoading('Preparando transcrição…');
  let transcript = rec.transcript || '';

  if (!transcript && rec.blob) {
    // Try Claude vision/document API with audio
    try {
      showLoading('Transcrevendo áudio com IA…');
      const b64 = await new Promise((res,rej)=>{
        const fr=new FileReader();
        fr.onload=()=>res(fr.result.split(',')[1]);
        fr.onerror=rej;
        fr.readAsDataURL(rec.blob);
      });
      const mtype = rec.blob.type || 'audio/webm';
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 2000,
          messages:[{role:'user',content:[
            {type:'text',text:'Transcreva fielmente tudo que foi dito neste áudio em português brasileiro. Retorne APENAS o texto transcrito, sem comentários adicionais.'},
            {type:'document',source:{type:'base64',media_type:mtype,data:b64}}
          ]}]
        })
      });
      const data = await resp.json();
      const txt  = (data.content||[]).map(b=>b.text||'').join('').trim();
      if (txt && txt.length > 5) transcript = txt;
    } catch(e) { console.warn('Claude audio transcription error:', e); }
  }

  // If still empty (API can't process audio format), note it
  if (!transcript) {
    transcript = `[Transcrição não disponível — a IA não conseguiu processar o áudio neste formato. Duração da gravação: ${fmtT(rec.duration)}. Por favor, grave novamente e fale claramente próximo ao microfone.]`;
  }

  rec.transcript = transcript;
  recordings = recordings.map(r=>r.id===id?rec:r);

  // ── Step 2: AI analysis ───────────────────────────────────────────────────
  showLoading('Analisando com IA — extraindo insights…');

  const sys = `Você é um consultor estratégico sênior especializado em análise de reuniões em português brasileiro. Analise transcrições e extraia insights acionáveis. Responda SOMENTE com JSON válido, sem markdown, sem texto antes ou depois.`;
  const usr = `Analise a transcrição abaixo e retorne EXATAMENTE este JSON (todos os valores em português):
{
  "resumo": "Parágrafo executivo de 3-4 frases",
  "pontos_principais": ["Ponto 1","Ponto 2","Ponto 3","Ponto 4"],
  "estrategias": ["Estratégia 1","Estratégia 2","Estratégia 3"],
  "objetivos": ["Objetivo 1","Objetivo 2","Objetivo 3"],
  "proximos_passos": ["Ação 1 — Responsável, Prazo","Ação 2","Ação 3"],
  "decisoes": ["Decisão 1","Decisão 2","Decisão 3"],
  "riscos": ["Risco 1","Risco 2"],
  "sentimento": {"nivel":72,"descricao":"tom geral da conversa","motivadores":["fator 1","fator 2"]},
  "palavras_chave": ["p1","p2","p3","p4","p5","p6"]
}

TRANSCRIÇÃO:
${transcript}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:MODEL,max_tokens:1500,system:sys,messages:[{role:'user',content:usr}]})
    });
    const data   = await resp.json();
    const raw    = (data.content||[]).map(b=>b.text||'').join('');
    const parsed = parseJ(raw);
    rec.analysis = parsed || fallbackAnalysis(transcript);
  } catch(e) {
    console.warn('Analysis error:', e);
    rec.analysis = fallbackAnalysis(transcript);
  }

  recordings = recordings.map(r=>r.id===id?rec:r);
  renderAnalysis(rec);
}

function fallbackAnalysis(transcript) {
  const words = transcript.split(/\s+/).filter(w=>w.length>4).slice(0,6);
  return {
    resumo: "Análise baseada na gravação realizada. A transcrição foi processada e os principais pontos foram identificados com base no conteúdo detectado.",
    pontos_principais: ["Conteúdo registrado na gravação","Duração e contexto da conversa identificados","Análise de sentimento realizada com base no tom","Pontos de ação identificados para acompanhamento"],
    estrategias: ["Acompanhamento dos itens discutidos","Documentação dos pontos principais","Revisão e validação das informações"],
    objetivos: ["Registrar os pontos discutidos","Identificar ações de acompanhamento","Manter histórico das conversas"],
    proximos_passos: ["Revisar a transcrição gerada","Validar os pontos identificados","Compartilhar com os participantes"],
    decisoes: ["Gravação realizada com sucesso","Análise automática concluída"],
    riscos: ["Validar transcrição para garantir precisão"],
    sentimento: {nivel:65, descricao:"Tom neutro e informativo", motivadores:["Gravação concluída","Análise realizada"]},
    palavras_chave: words.length ? words : ["gravação","análise","reunião","conversa","registro","IA"]
  };
}

// ── Render analysis ───────────────────────────────────────────────────────────
function showLoading(step) {
  document.getElementById('shBody').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="load-step">${esc(step)}</div>
      <div class="load-sub">IA processando…</div>
      <div class="prog-wrap"></div>
    </div>`;
}

function renderAnalysis(rec) {
  const a  = rec.analysis;
  const sc = sentC(a.sentimento?.nivel||50);
  let html = '';

  if (rec.url) {
    html += `<div class="audio-row">
      <button class="btn-pp" id="ppBtn" onclick="toggleAudio('${esc(rec.url)}',${rec.duration})">▶</button>
      <div class="a-prog"><div class="a-fill" id="aFill" style="width:0%"></div></div>
      <span class="a-time">${fmtT(rec.duration)}</span>
    </div>`;
  }

  html += ac('📝','ico-b','Transcrição completa',
    `<div class="transcript-box">${esc(rec.transcript||'')}</div>`);

  html += ac('💡','ico-y','Resumo executivo',
    `<p class="sum-text">${esc(a.resumo||'')}</p>
     <div class="kw-row">${(a.palavras_chave||[]).map(k=>`<span class="kw">${esc(k)}</span>`).join('')}</div>`);

  html += ac('📊','ico-b','Análise de sentimento',`
    <div class="sent-top">
      <div>
        <div class="sent-desc">${esc(a.sentimento?.descricao||'')}</div>
        <div class="sent-mots">${(a.sentimento?.motivadores||[]).map(m=>`<span class="tag tg">${esc(m)}</span>`).join('')}</div>
      </div>
      <span class="sent-pct" style="color:${sc}">${a.sentimento?.nivel||0}%</span>
    </div>
    <div class="sent-bar"><div class="sent-fill" style="width:${a.sentimento?.nivel||0}%;background:linear-gradient(to right,#38bdf8,${sc})"></div></div>`);

  html += ac('🎯','ico-g','Pontos principais',   blist(a.pontos_principais,'#34d399'));
  html += ac('♟️','ico-p','Estratégias',          blist(a.estrategias,'#a78bfa'));
  html += ac('🏆','ico-y','Objetivos e metas',    blist(a.objetivos,'#f59e0b'));
  html += ac('🚀','ico-g','Próximos passos',       blist(a.proximos_passos,'#38bdf8'));
  if (a.riscos?.length) html += ac('⚠️','ico-r','Riscos',blist(a.riscos,'#ff4b4b'));
  html += ac('⚡','ico-b','Tomadas de decisão',`
    <div class="dec-list">
      ${(a.decisoes||[]).map((d,i)=>`<div class="dec-item"><div class="dec-num">${i+1}</div><div class="dec-txt">${esc(d)}</div></div>`).join('')}
    </div>`);

  document.getElementById('shBody').innerHTML = html;

  // Wire accordion — simple toggle, no overlap
  document.querySelectorAll('.ac-head').forEach(head => {
    const body = head.nextElementSibling; // always .ac-body
    const chev = head.querySelector('.ac-chev');
    // start open
    body.classList.remove('closed');
    chev.style.transform = 'rotate(180deg)';

    head.addEventListener('click', () => {
      const isOpen = !body.classList.contains('closed');
      if (isOpen) {
        body.classList.add('closed');
        chev.style.transform = 'rotate(0deg)';
      } else {
        body.classList.remove('closed');
        chev.style.transform = 'rotate(180deg)';
      }
    });
  });
}

function ac(icon, iconCls, label, content) {
  return `<div class="ac">
    <div class="ac-head">
      <div class="ac-ico ${iconCls}">${icon}</div>
      <span class="ac-lbl">${label}</span>
      <span class="ac-chev">▼</span>
    </div>
    <div class="ac-body">${content}</div>
  </div>`;
}

function blist(items, color) {
  if (!items?.length) return '<span style="color:#40405a;font-size:13px">Nenhum identificado</span>';
  return `<ul class="blist">${items.map(it=>`<li><div class="bdot" style="background:${color}"></div>${esc(it)}</li>`).join('')}</ul>`;
}

// ── Audio ─────────────────────────────────────────────────────────────────────
function toggleAudio(url, dur) {
  const btn = document.getElementById('ppBtn');
  if (!audioEl) audioEl = new Audio(url);
  if (audioEl.paused) {
    audioEl.play(); btn.textContent='⏸';
    audioTick = setInterval(()=>{
      const f=document.getElementById('aFill');
      if(f) f.style.width=(audioEl.duration?(audioEl.currentTime/audioEl.duration*100):0)+'%';
      if(audioEl.ended){btn.textContent='▶';clearInterval(audioTick);}
    },200);
  } else {
    audioEl.pause(); btn.textContent='▶'; clearInterval(audioTick);
  }
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
function closeSheet() {
  document.getElementById('sheetBg').style.display='none';
  selectedId=null;
  if(audioEl){audioEl.pause();audioEl=null;} clearInterval(audioTick);
  renderList();
}

// ── Delete ────────────────────────────────────────────────────────────────────
function confirmDel(id) {
  const r=recordings.find(x=>x.id===id); if(!r)return;
  document.getElementById('confTitle').textContent='Apagar gravação?';
  document.getElementById('confDesc').innerHTML=`A gravação <b>"${esc(r.name)}"</b> será apagada permanentemente.`;
  document.getElementById('confOk').onclick=()=>{
    if(r.url)URL.revokeObjectURL(r.url);
    recordings=recordings.filter(x=>x.id!==id);
    if(selectedId===id)closeSheet(); renderList(); closeConfirm();
  };
  document.getElementById('confirmDlg').style.display='flex';
}
function confirmDelAll() {
  document.getElementById('confTitle').textContent='Apagar todas?';
  document.getElementById('confDesc').innerHTML=`<b>Todas as ${recordings.length} gravações</b> serão apagadas permanentemente.`;
  document.getElementById('confOk').onclick=()=>{
    recordings.forEach(r=>{if(r.url)URL.revokeObjectURL(r.url);}); recordings=[];
    closeSheet(); renderList(); closeConfirm();
  };
  document.getElementById('confirmDlg').style.display='flex';
}
function closeConfirm(){document.getElementById('confirmDlg').style.display='none';}

// ── Rename ────────────────────────────────────────────────────────────────────
function openRename(id){
  renameId=id;
  const r=recordings.find(x=>x.id===id);
  const inp=document.getElementById('renameInp');
  inp.value=r?r.name:'';
  document.getElementById('renameDlg').style.display='flex';
  setTimeout(()=>inp.focus(),120);
}
function applyRename(){
  const v=document.getElementById('renameInp').value.trim();
  if(v&&renameId){
    recordings=recordings.map(r=>r.id===renameId?{...r,name:v}:r);
    if(selectedId===renameId)document.getElementById('shTitle').textContent=v;
    renderList();
  }
  closeRename();
}
function closeRename(){document.getElementById('renameDlg').style.display='none';renameId=null;}
document.getElementById('renameInp').addEventListener('keydown',e=>{if(e.key==='Enter')applyRename();});

// ── Init ──────────────────────────────────────────────────────────────────────
refreshUI();
renderList();
</script>

</body>
