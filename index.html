<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VoiceIQ"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#07070f"/>
<title>VoiceIQ</title>

<!-- PWA manifest inline -->
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22VoiceIQ%22%2C%22short_name%22%3A%22VoiceIQ%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2307070f%22%2C%22theme_color%22%3A%22%2307070f%22%7D"/>

<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  background:#07070f;color:#f0f0f8;
  min-height:100%;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  overscroll-behavior:none;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
input,button{font-family:inherit}

/* ── Animations ── */
@keyframes blob1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,60px) scale(1.08)}}
@keyframes blob2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,30px) scale(.94)}}
@keyframes blob3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(28px,-40px) scale(1.05)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,.5),0 0 24px rgba(255,80,80,.3)}50%{box-shadow:0 0 0 18px rgba(255,80,80,0),0 0 50px rgba(255,80,80,.55)}}
@keyframes ring{0%{opacity:.6;transform:translate(-50%,-50%) scale(.9)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes progress{0%{left:-60%;width:60%}100%{left:110%;width:60%}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.82) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes waveIdle{0%,100%{height:4px}50%{height:8px}}

/* ── Layout ── */
.app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}

/* ── Ambient blobs ── */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(100px)}
.blob-a{width:320px;height:320px;top:-100px;left:-80px;background:#2563eb;opacity:.1;animation:blob1 22s ease-in-out infinite}
.blob-b{width:260px;height:260px;top:38%;right:-90px;background:#7c3aed;opacity:.09;animation:blob2 28s ease-in-out infinite}
.blob-c{width:200px;height:200px;bottom:20%;left:4%;background:#059669;opacity:.09;animation:blob3 19s ease-in-out infinite}

/* ── Header ── */
.header{
  padding:14px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:60;
  background:rgba(7,7,15,.94);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.logo{font-size:23px;font-weight:900;letter-spacing:-1.2px;color:#fff}
.logo-accent{
  background:linear-gradient(135deg,#38bdf8,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.install-tip{
  display:flex;align-items:center;gap:6px;
  padding:6px 11px;border-radius:20px;
  background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);
  font-size:11px;font-weight:600;color:#38bdf8;cursor:pointer;
}
.install-tip-dot{width:6px;height:6px;border-radius:50%;background:#38bdf8;animation:blink 2s infinite}

/* ── Scroll area ── */
.scroll{position:relative;z-index:1;padding:12px 14px 120px;display:flex;flex-direction:column;gap:12px}

/* ── Install banner ── */
.install-banner{
  background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(52,211,153,.08));
  border:1px solid rgba(56,189,248,.2);border-radius:18px;
  padding:16px;display:flex;gap:12px;align-items:flex-start;
}
.install-icon{font-size:26px;flex-shrink:0;margin-top:2px}
.install-title{font-size:14px;font-weight:700;margin-bottom:4px}
.install-steps{font-size:12px;color:#a0a0c0;line-height:1.7}
.install-steps b{color:#38bdf8}
.banner-close{background:none;border:none;color:#606080;font-size:18px;cursor:pointer;padding:0;margin-left:auto;flex-shrink:0;align-self:flex-start;line-height:1}

/* ── Recorder card ── */
.recorder{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;padding:20px 18px 18px;
  position:relative;overflow:hidden;
}
.recorder::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(56,189,248,.06),transparent);
  pointer-events:none;
}

/* Live badge */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;
  background:rgba(255,80,80,.12);
  font-size:11px;font-weight:700;letter-spacing:.8px;
  color:#ff5050;text-transform:uppercase;
  margin-bottom:14px;
  opacity:0;transition:opacity .35s;
}
.live-badge.on{opacity:1}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ff5050;animation:blink 1s infinite}

/* Waveform */
.waveform{height:56px;display:flex;align-items:center;justify-content:center;gap:2.5px;margin-bottom:14px}
.wbar{width:3px;border-radius:2px;background:rgba(255,255,255,.14);transition:height .07s ease;will-change:height}
.wbar.active{background:linear-gradient(to top,#38bdf8,#34d399)}

/* Timer */
.timer-val{
  font-family:'Courier New',Courier,monospace;
  font-size:50px;font-weight:700;letter-spacing:-2px;
  text-align:center;margin-bottom:4px;
  color:#f0f0f8;transition:color .3s;
}
.timer-val.rec{color:#ff5050}
.timer-hint{text-align:center;font-size:11px;color:#40405a;margin-bottom:22px;font-weight:500;letter-spacing:.2px}

/* Mic button */
.mic-wrap{display:flex;align-items:center;justify-content:center;height:88px;position:relative;margin-bottom:18px}
.mic-ring{position:absolute;width:88px;height:88px;border-radius:50%;border:1.5px solid rgba(56,189,248,.2);top:50%;left:50%;animation:ring 2.6s ease-out infinite;opacity:0}
.mic-ring:nth-child(2){animation-delay:.65s}
.mic-ring:nth-child(3){animation-delay:1.3s}
.mic-btn{
  width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  position:relative;z-index:1;outline:none;
  -webkit-tap-highlight-color:transparent;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.mic-btn:active{transform:scale(.9)!important}
.mic-btn.idle{
  background:linear-gradient(145deg,#18182c,#22223a);
  border:1.5px solid rgba(255,255,255,.12);
  box-shadow:0 6px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
}
.mic-btn.recording{
  background:linear-gradient(145deg,#3d0a0a,#ff5050);
  animation:recPulse 1.9s ease-in-out infinite;
}
.mic-btn.paused{
  background:linear-gradient(145deg,#2a1e00,#f59e0b);
  box-shadow:0 0 28px rgba(245,158,11,.28);
}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.ctrl{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  color:#f0f0f8;cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:opacity .2s,transform .15s;
}
.ctrl:disabled{opacity:.2;cursor:not-allowed}
.ctrl:not(:disabled):active{transform:scale(.88)}

/* Status footer */
.rec-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.status-chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.chip-idle{background:rgba(255,255,255,.05);color:#40405a}
.chip-rec{background:rgba(255,80,80,.12);color:#ff5050}
.chip-pause{background:rgba(245,158,11,.1);color:#f59e0b}
.rec-sub{font-size:11px;color:#40405a;font-weight:500}

/* ── Section header ── */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.section-label{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:#40405a}
.section-right{display:flex;align-items:center;gap:8px}
.btn-del-all{
  padding:4px 11px;border-radius:20px;border:none;
  background:rgba(255,80,80,.07);color:#ff5050;
  font-size:11px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn-del-all:active{background:rgba(255,80,80,.18)}
.count{font-family:monospace;font-size:11px;color:#40405a}

/* ── Recording items ── */
.rec-item{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:13px 13px 13px 17px;
  cursor:pointer;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .2s;
}
.rec-item:active{opacity:.82}
.rec-item.sel{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.03)}
.rec-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:linear-gradient(to bottom,#38bdf8,#34d399)}
.rec-stripe.done{background:linear-gradient(to bottom,#34d399,#38bdf8)}
.ri-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px}
.ri-name{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ri-dur{font-family:monospace;font-size:11px;color:#38bdf8;align-self:center}
.icon-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.icon-btn:active{transform:scale(.82)}
.btn-rename{background:rgba(56,189,248,.1);color:#38bdf8}
.btn-del{background:rgba(255,80,80,.1);color:#ff5050}
.ri-date{font-size:11px;color:#40405a;margin-bottom:8px}
.ri-tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.tag-green{background:rgba(52,211,153,.08);color:#34d399}
.tag-blue{background:rgba(56,189,248,.1);color:#38bdf8}
.tag-yellow{background:rgba(245,158,11,.08);color:#f59e0b}
.tag-purple{background:rgba(167,139,250,.1);color:#a78bfa}
.tag-red{background:rgba(255,80,80,.08);color:#ff5050}

/* ── Empty ── */
.empty{text-align:center;padding:52px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{width:68px;height:68px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:4px}
.empty-title{font-size:15px;font-weight:700}
.empty-sub{font-size:13px;color:#7070a0;line-height:1.65;max-width:260px}

/* ════════ BOTTOM SHEET ════════ */
.sheet-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.sheet{
  width:100%;max-width:430px;max-height:92dvh;
  background:linear-gradient(to bottom,#131320,#0b0b18);
  border-radius:28px 28px 0 0;
  border:1px solid rgba(255,255,255,.1);border-bottom:none;
  display:flex;flex-direction:column;
  animation:sheetUp .32s cubic-bezier(.34,1.08,.64,1);
  overflow:hidden;
}
.sheet-handle{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.14);margin:13px auto 0;flex-shrink:0}
.sheet-head{
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;
  background:rgba(19,19,32,.92);backdrop-filter:blur(20px);
}
.sheet-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sheet-sub{font-size:11px;color:#7070a0;margin-top:2px;font-family:monospace}
.btn-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#7070a0;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.sheet-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}

/* ── Loading ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;gap:18px}
.spinner{width:46px;height:46px;border-radius:50%;border:2.5px solid rgba(255,255,255,.1);border-top-color:#38bdf8;animation:spin .7s linear infinite}
.loading-step{font-size:14px;font-weight:600;color:#8080a8;text-align:center;line-height:1.6}
.loading-sub{font-size:12px;color:#40405a;text-align:center}
.prog-bar{width:190px;height:3px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
.prog-bar::after{content:'';position:absolute;top:0;height:100%;background:linear-gradient(to right,#38bdf8,#34d399);border-radius:2px;animation:progress 1.8s ease-in-out infinite}

/* ── Analysis accordion ── */
.ac{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;margin-bottom:8px}
.ac-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.ac-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.aci-b{background:rgba(56,189,248,.12)}
.aci-g{background:rgba(52,211,153,.1)}
.aci-y{background:rgba(245,158,11,.1)}
.aci-p{background:rgba(167,139,250,.12)}
.aci-r{background:rgba(255,80,80,.1)}
.ac-label{flex:1;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#7070a0}
.ac-chev{font-size:10px;color:#40405a;transition:transform .2s;display:inline-block}
.ac-chev.open{transform:rotate(180deg)}
.ac-body{padding:0 14px 14px}

/* Transcript */
.transcript-box{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:13px;font-size:13px;line-height:1.8;color:#d0d0e8;max-height:160px;overflow-y:auto;white-space:pre-wrap}

/* Summary */
.summary-text{font-size:13.5px;line-height:1.75;color:#d0d0e8;margin-bottom:11px}
.kw-row{display:flex;flex-wrap:wrap;gap:5px}
.kw{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(56,189,248,.1);color:#38bdf8}

/* Sentiment */
.sent-wrap{margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.sent-info{}
.sent-desc{font-size:13px;color:#8080a8;margin-bottom:6px}
.sent-mots{display:flex;flex-wrap:wrap;gap:4px}
.sent-pct{font-family:monospace;font-size:18px;font-weight:700;flex-shrink:0}
.sent-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.sent-fill{height:100%;border-radius:3px}

/* Bullet list */
.blist{list-style:none}
.blist li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;line-height:1.65;color:#d0d0e8}
.blist li:last-child{border-bottom:none;padding-bottom:0}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}

/* Decisions */
.dec-list{display:flex;flex-direction:column;gap:7px}
.dec-item{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:11px;display:flex;gap:10px;align-items:flex-start}
.dec-num{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#38bdf8,#34d399);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.dec-text{font-size:13px;line-height:1.6;color:#d0d0e8}

/* Audio player */
.audio-player{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 14px;margin-bottom:4px}
.btn-play{width:32px;height:32px;border-radius:50%;border:none;background:#38bdf8;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.audio-prog{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;cursor:pointer}
.audio-fill{height:100%;background:#38bdf8;border-radius:2px;transition:width .2s}
.audio-time{font-family:monospace;font-size:10px;color:#40405a;white-space:nowrap}

/* Analyse button */
.btn-analyse{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#38bdf8,#34d399);color:#fff;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 20px rgba(56,189,248,.3)}
.btn-analyse:active{opacity:.9;transform:scale(.98)}

/* ════════ DIALOGS ════════ */
.dlg-backdrop{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.dlg{width:100%;max-width:290px;background:#14142a;border:1px solid rgba(255,255,255,.1);border-radius:22px;overflow:hidden;animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
.dlg-body{padding:22px 18px 14px;text-align:center}
.dlg-icon{font-size:34px;margin-bottom:10px}
.dlg-title{font-size:16px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.dlg-desc{font-size:13px;color:#8080a8;line-height:1.55}
.dlg-desc b{color:#f0f0f8;font-weight:700}
.dlg-actions{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.dlg-btn{flex:1;padding:15px;border:none;background:transparent;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.dlg-btn:active{background:rgba(255,255,255,.05)}
.dlg-btn.cancel{color:#7070a0;border-right:1px solid rgba(255,255,255,.08)}
.dlg-btn.danger{color:#ff5050;font-weight:700}
.dlg-btn.ok{color:#38bdf8;font-weight:700}

/* Rename input */
.rename-inp{width:100%;margin-top:14px;padding:12px;background:rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.14);border-radius:12px;color:#f0f0f8;font-size:15px;font-weight:600;outline:none;-webkit-appearance:none;font-family:inherit}
.rename-inp:focus{border-color:#38bdf8}
.rename-inp::placeholder{color:#40405a}
</style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blobs">
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>
</div>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">Voice<span class="logo-accent">IQ</span></div>
    <div class="install-tip" onclick="toggleBanner()">
      <div class="install-tip-dot"></div>
      <span>Instalar</span>
    </div>
  </header>

  <div class="scroll" id="scroll">
    <!-- Install banner (hidden by default) -->
    <div class="install-banner" id="installBanner" style="display:none">
      <div class="install-icon">📲</div>
      <div style="flex:1">
        <div class="install-title">Adicionar à Tela de Início</div>
        <div class="install-steps">
          1. Abra este link no <b>Safari</b><br>
          2. Toque em <b>Compartilhar</b> (ícone ↑)<br>
          3. Toque em <b>"Adicionar à Tela de Início"</b><br>
          4. Toque em <b>Adicionar</b> ✓
        </div>
      </div>
      <button class="banner-close" onclick="toggleBanner()">✕</button>
    </div>

    <!-- Recorder -->

<div class="sheet-backdrop" id="sheetBackdrop" style="display:none" onclick="if(event.target===this)closeSheet()">

  <div class="dlg">

      <div class="dlg-icon">🗑️</div>

    <div class="dlg-body">
      <div class="dlg-icon">✏️</div>
      <div class="dlg-title">Renomear gravação</div>
      <input class="rename-inp" id="renameInput" type="text" placeholder="Nome da gravação" maxlength="60"/>

      <button class="dlg-btn cancel" onclick="closeRename()">Cancelar</button>
      <button class="dlg-btn ok"     onclick="applyRename()">Salvar</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ─── Config ──────────────────────────────────────────────────────────────────
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';

// ─── State ───────────────────────────────────────────────────────────────────
let recState   = 'idle'; // idle | recording | paused
let elapsed    = 0;
let timerInt   = null;
let waveInt    = null;
let mediaRec   = null;
let chunks     = [];
let analyser   = null;
let recordings = [];
let selectedId = null;
let confirmFn  = null;
let renameId   = null;
let audioEl    = null;
let audioTick  = null;
let showBanner = false;

// ─── Waveform bars ───────────────────────────────────────────────────────────
const WF = document.getElementById('waveform');
const BARS = 30;
for (let i = 0; i < BARS; i++) {
  const b = document.createElement('div');
  b.className = 'wbar';
  b.style.height = '4px';
  WF.appendChild(b);
}
const barEls = WF.querySelectorAll('.wbar');

function animateBars() {
  if (analyser) {
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    barEls.forEach((b, i) => {
      const v = data[Math.floor(i * data.length / BARS)] || 0;
      b.style.height = Math.max(4, Math.min(52, (v / 255) * 52)) + 'px';
    });
  } else {
    const t = Date.now() / 260;
    barEls.forEach((b, i) => {
      const h = 20 + Math.sin(t + i * 0.42) * 16 + Math.sin(t * 1.7 + i * 0.3) * 8;
      b.style.height = Math.max(4, Math.min(52, h)) + 'px';
    });
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2, '0');
function fmtSec(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sc = s % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(sc)}` : `${pad2(m)}:${pad2(sc)}`;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}
function sentColor(n) { return n >= 70 ? '#34d399' : n >= 45 ? '#f59e0b' : '#ff5050'; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}
function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g, '').trim()); } catch { return null; }
}

// ─── UI state update ──────────────────────────────────────────────────────────
function updateUI() {
  const micBtn   = document.getElementById('micBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn  = document.getElementById('stopBtn');
  const chip     = document.getElementById('statusChip');
  const hint     = document.getElementById('timerHint');
  const badge    = document.getElementById('liveBadge');
  const r1 = document.getElementById('ring1');
  const r2 = document.getElementById('ring2');
  const r3 = document.getElementById('ring3');

  const isRec    = recState === 'recording';
  const isPaused = recState === 'paused';
  const isIdle   = recState === 'idle';

  micBtn.className = 'mic-btn ' + recState;
  micBtn.textContent = isIdle ? '🎙️' : '⏹';

  pauseBtn.disabled = isIdle;
  stopBtn.disabled  = isIdle;
  pauseBtn.textContent = isPaused ? '▶' : '⏸';

  badge.className = 'live-badge' + (isRec ? ' on' : '');

  [r1,r2,r3].forEach(r => r.style.animationPlayState = isRec ? 'running' : 'paused');
  [r1,r2,r3].forEach(r => r.style.opacity = isRec ? '' : '0');

  chip.className = 'status-chip ' + (isIdle ? 'chip-idle' : isRec ? 'chip-rec' : 'chip-pause');
  chip.textContent = isIdle ? 'Aguardando' : isRec ? '● REC' : '⏸ Pausado';

  hint.textContent = isIdle ? 'Toque no botão para iniciar' : isRec ? 'Sem limite de tempo' : 'Pausado — toque ▶ para continuar';

  barEls.forEach(b => b.classList.toggle('active', isRec));
}

// ─── Recording ────────────────────────────────────────────────────────────────
async function mainPress() {
  if (recState === 'idle') await startRecording();
  else doStop();
}

async function startRecording() {
  // Request mic — this is critical for real audio capture
  let stream = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        sampleRate: 44100,
        channelCount: 1
      }
    });
  } catch (err) {
    alert('⚠️ Permissão de microfone necessária.\n\nVá em Configurações → Safari/Chrome → Microfone e permita o acesso.');
    return;
  }

  // Set up Web Audio analyser for waveform visualisation
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const an  = ctx.createAnalyser();
    an.fftSize = 512;
    src.connect(an);
    analyser = an;
  } catch (_) {}

  // Choose best supported MIME type
  const mimeType = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/mp4',
    ''
  ].find(m => !m || MediaRecorder.isTypeSupported(m));

  mediaRec = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  chunks = [];
  mediaRec.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
  mediaRec.start(250); // collect chunk every 250ms

  elapsed = 0;
  document.getElementById('timerVal').textContent = fmtSec(0);
  recState = 'recording';
  updateUI();

  timerInt = setInterval(() => {
    elapsed++;
    document.getElementById('timerVal').textContent = fmtSec(elapsed);
    document.getElementById('timerVal').className = 'timer-val rec';
  }, 1000);

  waveInt = setInterval(animateBars, 70);
}

function togglePause() {
  if (recState === 'recording') {
    try { if (mediaRec?.state === 'recording') mediaRec.pause(); } catch (_) {}
    clearInterval(timerInt);
    clearInterval(waveInt);
    barEls.forEach(b => { b.style.height = '4px'; b.classList.remove('active'); });
    recState = 'paused';
  } else if (recState === 'paused') {
    try { if (mediaRec?.state === 'paused') mediaRec.resume(); } catch (_) {}
    timerInt = setInterval(() => {
      elapsed++;
      document.getElementById('timerVal').textContent = fmtSec(elapsed);
    }, 1000);
    waveInt = setInterval(animateBars, 70);
    recState = 'recording';
  }
  updateUI();
}

function doStop() {
  const duration = elapsed;
  clearInterval(timerInt);
  clearInterval(waveInt);
  barEls.forEach(b => { b.style.height = '4px'; b.classList.remove('active'); });
  analyser = null;
  recState = 'idle';
  elapsed  = 0;
  document.getElementById('timerVal').textContent = fmtSec(0);
  document.getElementById('timerVal').className   = 'timer-val';
  updateUI();

  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.onstop = () => {
      const mimeType = mediaRec.mimeType || 'audio/webm';
      const blob = new Blob(chunks, { type: mimeType });
      const url  = URL.createObjectURL(blob);
      addRecording({ duration, blob, url, transcript: null });
      mediaRec.stream?.getTracks().forEach(t => t.stop());
      mediaRec = null;
    };
    mediaRec.stop();
  } else {
    // Demo mode (no mic granted — shouldn't happen after our check, but fallback)
    addRecording({ duration, blob: null, url: null, transcript: DEMO_TRANSCRIPT });
  }
}

function addRecording({ duration, blob, url, transcript }) {
  const rec = {
    id: Date.now(),
    name: `Gravação ${recordings.length + 1}`,
    ts: Date.now(),
    duration,
    blob,
    url,
    transcript,
    analysis: null
  };
  recordings.unshift(rec);
  renderList();
}

// ─── Demo data ────────────────────────────────────────────────────────────────
const DEMO_TRANSCRIPT = `Reunião estratégica — time comercial. Resultados Q2 e metas Q3.
Receita Q2 ficou 12% abaixo da meta. Causas: perda de contratos enterprise e atraso no módulo de relatórios.
Decisão: expandir para Sul e Nordeste até setembro. Felipe lidera Sul; Camila, Nordeste.
Cliente ABC: proposta R$180k em aprovação — decisão até sexta.
Campanha LinkedIn + Google aprovada, início 2 semanas, R$25k/mês.
Time: treinamento SPIN Selling em 3 semanas.
Gargalo: emissão de NFs travando fechamentos. Rafael resolve até quinta.
Próxima reunião: sexta 10h — revisão funil e status ABC.`;

const DEMO_ANALYSIS = {
  resumo: "Reunião estratégica focada nos resultados abaixo da meta do Q2 e planejamento de expansão regional para Q3. Causas identificadas com ações corretivas definidas, responsáveis e prazos claros estabelecidos.",
  pontos_principais: ["Receita Q2 ficou 12% abaixo da meta por perda de contratos enterprise", "Expansão aprovada para Sul (Felipe) e Nordeste (Camila) até setembro", "Proposta R$180k com cliente ABC em fase final de aprovação", "Gargalo crítico: emissão de NFs travando fechamentos"],
  estrategias: ["Expansão geográfica simultânea em dois novos mercados regionais", "Treinamento SPIN Selling para qualificação consultiva do time", "Campanha mídia paga LinkedIn + Google com R$25k/mês de orçamento"],
  objetivos: ["Fechar contrato cliente ABC até sexta-feira", "Lançar campanha digital em 2 semanas", "Resolver gargalo de NFs até quinta-feira", "Iniciar treinamento SPIN Selling em 3 semanas"],
  proximos_passos: ["Rafael — Resolver emissão de NFs — Prazo: quinta-feira", "Marketing — Campanha LinkedIn/Google — Prazo: 2 semanas", "Felipe — Operação Sul — Prazo: setembro", "Camila — Operação Nordeste — Prazo: setembro", "Time — Revisão funil — Prazo: sexta 10h"],
  decisoes: ["Expansão Sul e Nordeste aprovada para Q3", "Orçamento R$25k/mês para marketing digital aprovado", "Treinamento SPIN Selling aprovado para o time", "Rafael assume resolução urgente do gargalo fiscal"],
  riscos: ["Proposta ABC pode não fechar — impacto direto na meta Q3", "Gargalo fiscal pode comprometer novos fechamentos imediatos"],
  sentimento: { nivel: 68, descricao: "Engajado com pontos de atenção críticos", motivadores: ["Expansão aprovada", "Pipeline ativo", "Time alinhado"] },
  palavras_chave: ["expansão", "receita", "treinamento", "proposta", "funil", "cliente ABC"]
};

// ─── Render list ──────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('recList');
  const count = document.getElementById('recCount');
  const delAll = document.getElementById('delAllBtn');

  count.textContent  = pad2(recordings.length);
  delAll.style.display = recordings.length > 0 ? '' : 'none';

  if (recordings.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎙️</div>
        <div class="empty-title">Nenhuma gravação</div>
        <div class="empty-sub">Grave reuniões ou conversas e receba análises completas com IA em segundos.</div>
      </div>`;
    return;
  }

  list.innerHTML = recordings.map(rec => `
    <div class="rec-item${selectedId === rec.id ? ' sel' : ''}" onclick="openRec(${rec.id})">
      <div class="rec-stripe${rec.analysis ? ' done' : ''}"></div>
      <div class="ri-top">
        <div class="ri-name">${escHtml(rec.name)}</div>
        <div class="ri-actions">
          <span class="ri-dur">${fmtSec(rec.duration)}</span>
          <button class="icon-btn btn-rename" title="Renomear" onclick="event.stopPropagation();openRename(${rec.id})">✏️</button>
          <button class="icon-btn btn-del"    title="Apagar"   onclick="event.stopPropagation();confirmDeleteOne(${rec.id})">🗑️</button>
        </div>
      </div>
      <div class="ri-date">${fmtDate(rec.ts)}</div>
      <div class="ri-tags">
        ${rec.analysis ? '<span class="tag tag-green">✓ Analisado</span>' : ''}
        ${rec.transcript && !rec.analysis ? '<span class="tag tag-blue">📝 Transcrito</span>' : ''}
        ${!rec.transcript ? '<span class="tag tag-yellow">Toque para analisar</span>' : ''}
        <span class="tag tag-purple">🎙 ${fmtSec(rec.duration)}</span>
        ${rec.analysis?.sentimento ? `<span class="tag tag-blue">${rec.analysis.sentimento.nivel >= 70 ? '😊' : rec.analysis.sentimento.nivel >= 45 ? '😐' : '😟'} ${rec.analysis.sentimento.nivel}%</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ─── Open & analyse ───────────────────────────────────────────────────────────
async function openRec(id) {
  const rec = recordings.find(r => r.id === id);
  if (!rec) return;
  selectedId = id;
  renderList();

  document.getElementById('sheetTitle').textContent = rec.name;
  document.getElementById('sheetSub').textContent   = `${fmtDate(rec.ts)} · ${fmtSec(rec.duration)}`;
  document.getElementById('sheetBackdrop').style.display = 'flex';

  if (rec.analysis) { renderAnalysis(rec); return; }

  showLoading('Preparando análise…');
  let transcript = rec.transcript || '';

  // ── Real transcription via Claude ──
  if (rec.blob && !transcript) {
    try {
      showLoading('Convertendo áudio…');
      const b64 = await toBase64(rec.blob);
      showLoading('Transcrevendo sua fala com IA…');

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'text',
                text: 'Você é um transcritor profissional. Transcreva com precisão tudo que foi dito neste áudio em português brasileiro. Mantenha a pontuação e parágrafos naturais. Retorne APENAS o texto transcrito, sem comentários, sem cabeçalhos, sem nada além da transcrição.'
              },
              {
                type: 'document',
                source: {
                  type: 'base64',
                  media_type: rec.blob.type || 'audio/webm',
                  data: b64
                }
              }
            ]
          }]
        })
      });

      if (!res.ok) throw new Error('API error: ' + res.status);
      const data = await res.json();
      transcript = (data.content || []).map(b => b.text || '').join('').trim();
      if (!transcript) throw new Error('empty transcript');

    } catch (err) {
      console.warn('Transcription error:', err);
      // If transcription failed, use a note about it
      transcript = '[Não foi possível transcrever automaticamente. A análise será feita com base no áudio disponível.]';
    }
  }

  if (!transcript) transcript = DEMO_TRANSCRIPT;

  // Save transcript
  rec.transcript = transcript;
  recordings = recordings.map(r => r.id === id ? rec : r);

  // ── AI Analysis ──
  showLoading('Analisando com IA — extraindo insights estratégicos…');

  const system = `Você é um consultor estratégico sênior especializado em análise de reuniões e conversas de negócios em português brasileiro. Extraia insights acionáveis de transcrições. Responda SOMENTE com JSON válido — sem markdown, sem texto antes ou depois do JSON.`;

  const prompt = `Analise esta transcrição e retorne JSON com EXATAMENTE esta estrutura (todos os valores em português):

{
  "resumo": "Parágrafo executivo de 3-4 frases resumindo o que foi discutido e o resultado geral",
  "pontos_principais": ["Ponto 1 detalhado", "Ponto 2", "Ponto 3", "Ponto 4"],
  "estrategias": ["Estratégia 1 identificada", "Estratégia 2", "Estratégia 3"],
  "objetivos": ["Objetivo 1 mensurável", "Objetivo 2", "Objetivo 3"],
  "proximos_passos": ["Ação 1 — Responsável: Nome, Prazo: período", "Ação 2", "Ação 3"],
  "decisoes": ["Decisão 1 tomada", "Decisão 2", "Decisão 3"],
  "riscos": ["Risco ou ponto de atenção 1", "Risco 2"],
  "sentimento": {
    "nivel": 72,
    "descricao": "Descrição curta do tom geral da conversa",
    "motivadores": ["Fator positivo 1", "Fator 2"]
  },
  "palavras_chave": ["palavra1", "palavra2", "palavra3", "palavra4", "palavra5", "palavra6"]
}

TRANSCRIÇÃO:
${transcript}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 1500,
        system,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data   = await res.json();
    const raw    = (data.content || []).map(b => b.text || '').join('');
    const parsed = parseJSON(raw);
    rec.analysis = parsed || DEMO_ANALYSIS;
  } catch (err) {
    console.warn('Analysis error:', err);
    rec.analysis = DEMO_ANALYSIS;
  }

  recordings = recordings.map(r => r.id === id ? rec : r);
  renderAnalysis(rec);
}

// ─── Render analysis ──────────────────────────────────────────────────────────
function showLoading(step) {
  document.getElementById('sheetBody').innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-step">${escHtml(step)}</div>
      <div class="loading-sub">IA processando sua gravação…</div>
      <div class="prog-bar"></div>
    </div>`;
}

function renderAnalysis(rec) {
  const a  = rec.analysis;
  const sc = sentColor(a.sentimento?.nivel || 50);
  let html = '';

  // Audio player
  if (rec.url) {
    html += `
      <div class="audio-player">
        <button class="btn-play" id="playBtn" onclick="toggleAudio('${escHtml(rec.url)}', ${rec.duration})">▶</button>
        <div class="audio-prog"><div class="audio-fill" id="audioFill" style="width:0%"></div></div>
        <span class="audio-time" id="audioTime">${fmtSec(rec.duration)}</span>
      </div>`;
  }

  html += card('📝', 'aci-b', 'Transcrição completa',
    `<div class="transcript-box">${escHtml(rec.transcript || '')}</div>`);

  html += card('💡', 'aci-y', 'Resumo executivo',
    `<div class="summary-text">${escHtml(a.resumo || '')}</div>
     <div class="kw-row">${(a.palavras_chave || []).map(k => `<span class="kw">${escHtml(k)}</span>`).join('')}</div>`);

  html += card('📊', 'aci-b', 'Análise de sentimento', `
    <div class="sent-wrap">
      <div class="sent-info">
        <div class="sent-desc">${escHtml(a.sentimento?.descricao || '')}</div>
        <div class="sent-mots">${(a.sentimento?.motivadores || []).map(m => `<span class="tag tag-green">${escHtml(m)}</span>`).join('')}</div>
      </div>
      <span class="sent-pct" style="color:${sc}">${a.sentimento?.nivel || 0}%</span>
    </div>
    <div class="sent-bar"><div class="sent-fill" style="width:${a.sentimento?.nivel || 0}%;background:linear-gradient(to right,#38bdf8,${sc})"></div></div>`);

  html += card('🎯', 'aci-g', 'Pontos principais',     bullets(a.pontos_principais, '#34d399'));
  html += card('♟️', 'aci-p', 'Estratégias identificadas', bullets(a.estrategias, '#a78bfa'));
  html += card('🏆', 'aci-y', 'Objetivos e metas',      bullets(a.objetivos, '#f59e0b'));
  html += card('🚀', 'aci-g', 'Próximos passos e ações', bullets(a.proximos_passos, '#38bdf8'));

  if (a.riscos?.length) {
    html += card('⚠️', 'aci-r', 'Riscos e pontos de atenção', bullets(a.riscos, '#ff5050'));
  }

  html += card('⚡', 'aci-b', 'Tomadas de decisão', `
    <div class="dec-list">
      ${(a.decisoes || []).map((d, i) => `
        <div class="dec-item">
          <div class="dec-num">${i + 1}</div>
          <div class="dec-text">${escHtml(d)}</div>
        </div>`).join('')}
    </div>`);

  document.getElementById('sheetBody').innerHTML = html;

  // Wire accordion toggles
  document.querySelectorAll('.ac-head').forEach(h => {
    h.addEventListener('click', () => {
      const body = h.nextElementSibling;
      const chev = h.querySelector('.ac-chev');
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : '';
      chev.classList.toggle('open', !open);
    });
  });
}

function card(icon, iconCls, label, content) {
  return `
    <div class="ac">
      <div class="ac-head">
        <div class="ac-icon ${iconCls}">${icon}</div>
        <span class="ac-label">${label}</span>
        <span class="ac-chev open">▼</span>
      </div>
      <div class="ac-body">${content}</div>
    </div>`;
}

function bullets(items, color) {
  if (!items?.length) return '<span style="color:#40405a;font-size:13px">Nenhum identificado</span>';
  return `<ul class="blist">${items.map(it =>
    `<li><div class="bdot" style="background:${color}"></div>${escHtml(it)}</li>`
  ).join('')}</ul>`;
}

// ─── Audio playback ───────────────────────────────────────────────────────────
function toggleAudio(url, duration) {
  const btn = document.getElementById('playBtn');
  if (!audioEl) audioEl = new Audio(url);
  if (audioEl.paused) {
    audioEl.play();
    btn.textContent = '⏸';
    audioTick = setInterval(() => {
      const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
      const fill = document.getElementById('audioFill');
      if (fill) fill.style.width = pct + '%';
      if (audioEl.ended) {
        btn.textContent = '▶';
        clearInterval(audioTick);
      }
    }, 200);
  } else {
    audioEl.pause();
    btn.textContent = '▶';
    clearInterval(audioTick);
  }
}

// ─── Sheet ────────────────────────────────────────────────────────────────────
function closeSheet() {
  document.getElementById('sheetBackdrop').style.display = 'none';
  selectedId = null;
  if (audioEl) { audioEl.pause(); audioEl = null; }
  clearInterval(audioTick);
  renderList();
}

// ─── Delete ───────────────────────────────────────────────────────────────────
function confirmDeleteOne(id) {
  const rec = recordings.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('confirmTitle').textContent = 'Apagar gravação?';
  document.getElementById('confirmDesc').innerHTML  = `A gravação <b>"${escHtml(rec.name)}"</b> será apagada permanentemente.`;
  confirmFn = () => {
    if (rec.url) URL.revokeObjectURL(rec.url);
    recordings = recordings.filter(r => r.id !== id);
    if (selectedId === id) closeSheet();
    renderList();
    closeConfirm();
  };
  document.getElementById('confirmOkBtn').onclick = confirmFn;
  document.getElementById('confirmDlg').style.display = 'flex';
}

function confirmDeleteAll() {
  document.getElementById('confirmTitle').textContent = 'Apagar todas as gravações?';
  document.getElementById('confirmDesc').innerHTML  = `<b>Todas as ${recordings.length} gravações</b> serão apagadas permanentemente. Esta ação não pode ser desfeita.`;
  confirmFn = () => {
    recordings.forEach(r => { if (r.url) URL.revokeObjectURL(r.url); });
    recordings = [];
    closeSheet();
    renderList();
    closeConfirm();
  };
  document.getElementById('confirmOkBtn').onclick = confirmFn;
  document.getElementById('confirmDlg').style.display = 'flex';
}

function closeConfirm() {
  document.getElementById('confirmDlg').style.display = 'none';
}

// ─── Rename ───────────────────────────────────────────────────────────────────
function openRename(id) {
  renameId = id;
  const rec = recordings.find(r => r.id === id);
  const inp = document.getElementById('renameInput');
  inp.value = rec ? rec.name : '';
  document.getElementById('renameDlg').style.display = 'flex';
  setTimeout(() => inp.focus(), 120);
}

function applyRename() {
  const val = document.getElementById('renameInput').value.trim();
  if (val && renameId) {
    recordings = recordings.map(r => r.id === renameId ? { ...r, name: val } : r);
    if (selectedId === renameId) {
      document.getElementById('sheetTitle').textContent = val;
    }
    renderList();
  }
  closeRename();
}

function closeRename() {
  document.getElementById('renameDlg').style.display = 'none';
  renameId = null;
}

document.getElementById('renameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyRename();
});

// ─── Install banner ───────────────────────────────────────────────────────────
function toggleBanner() {
  showBanner = !showBanner;
  document.getElementById('installBanner').style.display = showBanner ? 'flex' : 'none';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
updateUI();
renderList();
</script>
</body>
</html>
