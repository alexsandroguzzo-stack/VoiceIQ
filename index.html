<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VoiceIQ"/>
<meta name="theme-color" content="#07070f"/>
<title>VoiceIQ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:#07070f;color:#f0f0f8;min-height:100%;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  overscroll-behavior:none;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
input,button{font-family:inherit}

@keyframes b1{0%,100%{transform:translate(0,0)}50%{transform:translate(38px,52px)}}
@keyframes b2{0%,100%{transform:translate(0,0)}50%{transform:translate(-42px,28px)}}
@keyframes b3{0%,100%{transform:translate(0,0)}50%{transform:translate(24px,-36px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(255,75,75,.5),0 0 24px rgba(255,75,75,.25)}50%{box-shadow:0 0 0 16px rgba(255,75,75,0),0 0 44px rgba(255,75,75,.5)}}
@keyframes ring{0%{opacity:.45;transform:translate(-50%,-50%) scale(.88)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes prog{0%{left:-55%;width:55%}100%{left:110%;width:55%}}
@keyframes sheetUp{from{transform:translateY(102%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}

.app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}

.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px)}
.ba{width:280px;height:280px;top:-80px;left:-70px;background:#1d4ed8;opacity:.1;animation:b1 22s ease-in-out infinite}
.bb{width:240px;height:240px;top:40%;right:-80px;background:#6d28d9;opacity:.09;animation:b2 26s ease-in-out infinite}
.bc{width:180px;height:180px;bottom:20%;left:5%;background:#065f46;opacity:.09;animation:b3 19s ease-in-out infinite}

/* Header */
.hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;background:rgba(7,7,15,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;color:#fff}
.logo em{font-style:normal;background:linear-gradient(135deg,#38bdf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-badge{padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:11px;font-weight:600;color:#44445a}

.scroll{position:relative;z-index:1;padding:12px 14px 110px;display:flex;flex-direction:column;gap:12px}

/* Recorder */
.rec-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:20px 18px 18px;position:relative;overflow:hidden}
.rec-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% -10%,rgba(56,189,248,.06),transparent);pointer-events:none}

.live{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(255,75,75,.12);font-size:11px;font-weight:700;letter-spacing:.8px;color:#ff4b4b;text-transform:uppercase;margin-bottom:14px;opacity:0;transition:opacity .3s;min-height:24px}
.live.on{opacity:1}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ff4b4b;flex-shrink:0;animation:blink 1s infinite}

.trans-live-wrap{display:none;margin-bottom:12px}
.trans-live-wrap.on{display:block}
.trans-live-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#38bdf8;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.trans-live-dot{width:5px;height:5px;border-radius:50%;background:#38bdf8;animation:blink .8s infinite}
.trans-live-box{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);border-radius:10px;padding:9px 11px;font-size:13px;color:#9dd8f5;line-height:1.6;min-height:38px;max-height:70px;overflow:hidden}

.wf{height:50px;display:flex;align-items:center;justify-content:center;gap:2.5px;margin-bottom:14px}
.wb{width:3px;border-radius:2px;background:rgba(255,255,255,.13);transition:height .07s ease}
.wb.a{background:linear-gradient(to top,#38bdf8,#34d399)}

.timer{font-family:'Courier New',Courier,monospace;font-size:48px;font-weight:700;letter-spacing:-2px;text-align:center;color:#f0f0f8;transition:color .3s;margin-bottom:4px}
.timer.rec{color:#ff4b4b}
.t-hint{text-align:center;font-size:11px;color:#40405a;margin-bottom:22px}

.mic-wrap{display:flex;align-items:center;justify-content:center;height:88px;position:relative;margin-bottom:18px}
.ring{position:absolute;width:90px;height:90px;border-radius:50%;border:1.5px solid rgba(56,189,248,.2);top:50%;left:50%;opacity:0;animation:ring 2.6s ease-out infinite}
.ring2{animation-delay:.7s}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;z-index:1;outline:none;-webkit-tap-highlight-color:transparent;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.mic-btn:active{transform:scale(.9)!important}
.mic-idle{background:linear-gradient(145deg,#18182c,#22223a);border:1.5px solid rgba(255,255,255,.12);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.mic-rec{background:linear-gradient(145deg,#3d0a0a,#ff4b4b);animation:rp 1.9s ease-in-out infinite}
.mic-paused{background:linear-gradient(145deg,#2a1e00,#f59e0b);box-shadow:0 0 26px rgba(245,158,11,.25)}

.ctrl-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.ctrl{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:#f0f0f8;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:opacity .2s,transform .15s}
.ctrl:disabled{opacity:.2;cursor:not-allowed}
.ctrl:not(:disabled):active{transform:scale(.88)}

.rec-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.chip-idle{background:rgba(255,255,255,.04);color:#40405a}
.chip-rec{background:rgba(255,75,75,.12);color:#ff4b4b}
.chip-pause{background:rgba(245,158,11,.1);color:#f59e0b}
.rec-sub{font-size:11px;color:#40405a}

/* Section */
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:#40405a}
.sec-right{display:flex;align-items:center;gap:8px}
.btn-delall{padding:4px 11px;border-radius:20px;border:none;background:rgba(255,75,75,.07);color:#ff4b4b;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cnt{font-family:monospace;font-size:11px;color:#40405a}

/* Rec items */
.ri{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:13px 13px 13px 17px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:border-color .2s;margin-bottom:8px}
.ri:active{opacity:.82}
.ri.sel{border-color:rgba(56,189,248,.3)}
.ri-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:linear-gradient(to bottom,#38bdf8,#34d399)}
.ri-stripe.done{background:linear-gradient(to bottom,#34d399,#38bdf8)}
.ri-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px}
.ri-name{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-acts{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ri-dur{font-family:monospace;font-size:11px;color:#38bdf8}
.ic-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;-webkit-tap-highlight-color:transparent}
.ic-btn:active{opacity:.7}
.ic-rename{background:rgba(56,189,248,.1);color:#38bdf8}
.ic-del{background:rgba(255,75,75,.1);color:#ff4b4b}
.ri-date{font-size:11px;color:#40405a;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.tg{background:rgba(52,211,153,.08);color:#34d399}
.tb{background:rgba(56,189,248,.1);color:#38bdf8}
.ty{background:rgba(245,158,11,.08);color:#f59e0b}
.tp{background:rgba(167,139,250,.1);color:#a78bfa}

.empty{text-align:center;padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{width:64px;height:64px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:4px}
.empty-title{font-size:15px;font-weight:700}
.empty-sub{font-size:13px;color:#7070a0;line-height:1.6;max-width:260px}

/* ── SHEET ── */
.sheet-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.sheet{width:100%;max-width:430px;max-height:92dvh;background:linear-gradient(to bottom,#131320,#0b0b18);border-radius:26px 26px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;display:flex;flex-direction:column;animation:sheetUp .3s cubic-bezier(.34,1.08,.64,1);overflow:hidden}
.sh-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.14);margin:13px auto 0;flex-shrink:0}
.sh-head{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;background:rgba(19,19,32,.95)}
.sh-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sh-sub{font-size:11px;color:#7070a0;margin-top:2px;font-family:monospace}
.btn-x{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#7070a0;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.sh-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px;text-align:center}
.spinner{width:44px;height:44px;border-radius:50%;border:2.5px solid rgba(255,255,255,.1);border-top-color:#38bdf8;animation:spin .7s linear infinite}
.load-step{font-size:14px;font-weight:600;color:#8080a8;line-height:1.6}
.load-sub{font-size:12px;color:#40405a}
.prog-wrap{width:180px;height:3px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.prog-wrap::after{content:'';position:absolute;top:0;height:100%;background:linear-gradient(to right,#38bdf8,#34d399);border-radius:2px;animation:prog 1.8s ease-in-out infinite}

/* ── Analysis — NO accordion, simple blocks ── */
.analysis-wrap{display:flex;flex-direction:column;gap:14px}

/* Audio player */
.audio-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 14px}
.btn-pp{width:34px;height:34px;border-radius:50%;border:none;background:#38bdf8;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.a-prog{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.a-fill{height:100%;background:#38bdf8;border-radius:2px;transition:width .2s}
.a-time{font-family:monospace;font-size:10px;color:#40405a;white-space:nowrap}

/* Section block */
.sec-block{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px}
.sec-block-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#40405a;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-block-title span{font-size:14px}

/* Transcript */
.transcript-text{font-size:13px;line-height:1.8;color:#b0b0d0;white-space:pre-wrap;max-height:140px;overflow-y:auto}

/* Resumo */
.resumo-text{font-size:14px;line-height:1.75;color:#e0e0f0}
.kw-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.kw{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(56,189,248,.1);color:#38bdf8}

/* Sentimento */
.sent-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sent-desc{font-size:13px;color:#a0a0c0}
.sent-pct{font-family:monospace;font-size:20px;font-weight:700}
.sent-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:8px}
.sent-fill{height:100%;border-radius:3px}
.sent-mots{display:flex;flex-wrap:wrap;gap:5px}
.sent-mot{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(52,211,153,.08);color:#34d399}

/* Bullet list */
.blist{list-style:none;display:flex;flex-direction:column;gap:0}
.blist li{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;line-height:1.6;color:#d0d0e8}
.blist li:last-child{border-bottom:none;padding-bottom:0}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}

/* Decisions */
.dec-list{display:flex;flex-direction:column;gap:7px}
.dec-item{display:flex;gap:10px;align-items:flex-start}
.dec-num{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#38bdf8,#34d399);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px}
.dec-txt{font-size:13px;line-height:1.6;color:#d0d0e8}

/* Analyse btn */
.btn-analyse{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#38bdf8,#34d399);color:#fff;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 18px rgba(56,189,248,.28)}
.btn-analyse:active{opacity:.9}

/* ── DIALOGS ── */
.dlg-bg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.dlg{width:100%;max-width:290px;background:#14142a;border:1px solid rgba(255,255,255,.1);border-radius:22px;overflow:hidden;animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
.dlg-body{padding:22px 18px 14px;text-align:center}
.dlg-icon{font-size:34px;margin-bottom:10px}
.dlg-title{font-size:16px;font-weight:800;margin-bottom:6px}
.dlg-desc{font-size:13px;color:#8080a8;line-height:1.55}
.dlg-desc b{color:#f0f0f8}
.dlg-acts{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.dlg-btn{flex:1;padding:15px;border:none;background:transparent;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.dlg-btn:active{background:rgba(255,255,255,.05)}
.dlg-cancel{color:#7070a0;border-right:1px solid rgba(255,255,255,.08)}
.dlg-danger{color:#ff4b4b;font-weight:700}
.dlg-ok{color:#38bdf8;font-weight:700}
.rename-inp{width:100%;margin-top:14px;padding:12px;background:rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.14);border-radius:12px;color:#f0f0f8;font-size:15px;font-weight:600;outline:none;-webkit-appearance:none}
.rename-inp:focus{border-color:#38bdf8}
.rename-inp::placeholder{color:#40405a}
</style>
</head>
<body>

<div class="blobs">
  <div class="blob ba"></div>
  <div class="blob bb"></div>
  <div class="blob bc"></div>
</div>

<div class="app">
  <header class="hdr">
    <div class="logo">Voice<em>IQ</em></div>
    <div class="hdr-badge">🎙️ PT-BR</div>
  </header>

  <div class="scroll">
    <div class="rec-card">
      <div class="live" id="liveBadge"><div class="live-dot"></div>Gravando</div>

      <div class="trans-live-wrap" id="transLiveWrap">
        <div class="trans-live-label"><div class="trans-live-dot"></div>Transcrevendo ao vivo</div>
        <div class="trans-live-box" id="transLiveBox"></div>
      </div>

      <div class="wf" id="wf"></div>
      <div class="timer" id="timer">00:00</div>
      <div class="t-hint" id="hint">Toque no botão para iniciar</div>

      <div class="mic-wrap">
        <div class="ring" id="ring1"></div>
        <div class="ring ring2" id="ring2"></div>
        <button class="mic-btn mic-idle" id="micBtn" onclick="mainPress()">🎙️</button>
      </div>

      <div class="ctrl-row">
        <button class="ctrl" id="pauseBtn" disabled onclick="togglePause()">⏸</button>
        <button class="ctrl" id="stopBtn"  disabled onclick="doStop()">⏹</button>
      </div>

      <div class="rec-foot">
        <span class="chip chip-idle" id="chip">Aguardando</span>
        <span class="rec-sub">Sem limite de tempo</span>
      </div>
    </div>

    <div class="sec-row">
      <span class="sec-lbl">Gravações</span>
      <div class="sec-right">
        <button class="btn-delall" id="delAllBtn" style="display:none" onclick="confirmDelAll()">Apagar tudo</button>
        <span class="cnt" id="cnt">00</span>
      </div>
    </div>

    <div id="recList"></div>
  </div>
</div>

<!-- Sheet -->
<div class="sheet-bg" id="sheetBg" style="display:none" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-head">
      <div>
        <div class="sh-title" id="shTitle">—</div>
        <div class="sh-sub"   id="shSub">—</div>
      </div>
      <button class="btn-x" onclick="closeSheet()">✕</button>
    </div>
    <div class="sh-body" id="shBody"></div>
  </div>
</div>

<!-- Confirm -->
<div class="dlg-bg" id="confirmDlg" style="display:none" onclick="if(event.target===this)closeConfirm()">
  <div class="dlg">
    <div class="dlg-body">
      <div class="dlg-icon">🗑️</div>
      <div class="dlg-title" id="confTitle">Apagar?</div>
      <div class="dlg-desc"  id="confDesc"></div>
    </div>
    <div class="dlg-acts">
      <button class="dlg-btn dlg-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="dlg-btn dlg-danger" id="confOk">Apagar</button>
    </div>
  </div>
</div>

<!-- Rename -->
<div class="dlg-bg" id="renameDlg" style="display:none" onclick="if(event.target===this)closeRename()">
  <div class="dlg">
    <div class="dlg-body">
      <div class="dlg-icon">✏️</div>
      <div class="dlg-title">Renomear</div>
      <input class="rename-inp" id="renameInp" type="text" placeholder="Nome da gravação" maxlength="60"/>
    </div>
    <div class="dlg-acts">
      <button class="dlg-btn dlg-cancel" onclick="closeRename()">Cancelar</button>
      <button class="dlg-btn dlg-ok"     onclick="applyRename()">Salvar</button>
    </div>
  </div>
</div>

<script>
'use strict';
const MODEL = 'claude-sonnet-4-20250514';

let recState='idle', elapsed=0, timerInt=null, waveInt=null;
let mediaRec=null, chunks=[], analyserNode=null;
let recordings=[], selectedId=null, confirmFn=null, renameId=null;
let audioEl=null, audioTick=null;
let recognition=null, fullTranscript='', interimText='';

// Waveform
const WF=document.getElementById('wf');
for(let i=0;i<30;i++){const b=document.createElement('div');b.className='wb';b.style.height='4px';WF.appendChild(b);}
const bars=WF.querySelectorAll('.wb');

function animWave(){
  if(analyserNode){
    const d=new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(d);
    bars.forEach((b,i)=>{const v=d[Math.floor(i*d.length/30)]||0;b.style.height=Math.max(4,Math.min(50,(v/255)*50))+'px';});
  } else {
    const t=Date.now()/250;
    bars.forEach((b,i)=>{const h=20+Math.sin(t+i*.42)*15+Math.sin(t*1.7+i*.3)*7;b.style.height=Math.max(4,Math.min(50,h))+'px';});
  }
}

const pad=n=>String(n).padStart(2,'0');
const fmtT=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h?`${pad(h)}:${pad(m)}:${pad(sc)}`:`${pad(m)}:${pad(sc)}`;};
const fmtD=ts=>new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
const sentC=n=>n>=70?'#34d399':n>=45?'#f59e0b':'#ff4b4b';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const parseJ=r=>{try{return JSON.parse(r.replace(/```json|```/g,'').trim());}catch{return null;}};

function refreshUI(){
  const isRec=recState==='recording',isPause=recState==='paused',isIdle=recState==='idle';
  const btn=document.getElementById('micBtn');
  btn.className='mic-btn '+(isIdle?'mic-idle':isRec?'mic-rec':'mic-paused');
  btn.textContent=isIdle?'🎙️':'⏹';
  document.getElementById('pauseBtn').disabled=isIdle;
  document.getElementById('stopBtn').disabled=isIdle;
  document.getElementById('pauseBtn').textContent=isPause?'▶':'⏸';
  document.getElementById('liveBadge').className='live'+(isRec?' on':'');
  document.getElementById('ring1').style.opacity=isRec?'':'0';
  document.getElementById('ring2').style.opacity=isRec?'':'0';
  const chip=document.getElementById('chip');
  chip.className='chip '+(isIdle?'chip-idle':isRec?'chip-rec':'chip-pause');
  chip.textContent=isIdle?'Aguardando':isRec?'● REC':'⏸ Pausado';
  document.getElementById('hint').textContent=isIdle?'Toque no botão para iniciar':isRec?'Sem limite de tempo':'Pausado — toque ▶ para continuar';
  bars.forEach(b=>b.classList.toggle('a',isRec));
}

// Speech recognition
function startSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();
  recognition.lang='pt-BR';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) fullTranscript+=t+' ';
      else interim+=t;
    }
    interimText=interim;
    const box=document.getElementById('transLiveBox');
    const preview=(fullTranscript+interim).trim();
    if(box&&preview){
      box.textContent=preview.length>200?'…'+preview.slice(-180):preview;
      document.getElementById('transLiveWrap').classList.add('on');
    }
  };
  recognition.onerror=e=>{if(recState==='recording'&&e.error!=='aborted'){try{recognition.start();}catch(_){}}};
  recognition.onend=()=>{if(recState==='recording'){try{recognition.start();}catch(_){}}};
  try{recognition.start();}catch(_){}
}

function stopSR(){
  document.getElementById('transLiveWrap').classList.remove('on');
  document.getElementById('transLiveBox').textContent='';
  if(recognition){try{recognition.stop();}catch(_){} recognition=null;}
}

async function mainPress(){if(recState==='idle')await startRec();else doStop();}

async function startRec(){
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,sampleRate:44100}});}
  catch(e){alert('⚠️ Permissão de microfone necessária.\n\nVá em Ajustes → Safari → Microfone e permita o acesso.');return;}
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const src=ctx.createMediaStreamSource(stream);const an=ctx.createAnalyser();an.fftSize=512;src.connect(an);analyserNode=an;}catch(_){}
  const mime=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4',''].find(m=>!m||MediaRecorder.isTypeSupported(m));
  mediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
  chunks=[];
  mediaRec.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data);};
  mediaRec.start(300);
  fullTranscript=''; interimText='';
  elapsed=0;
  document.getElementById('timer').textContent=fmtT(0);
  recState='recording'; refreshUI();
  timerInt=setInterval(()=>{elapsed++;const el=document.getElementById('timer');el.textContent=fmtT(elapsed);el.className='timer rec';},1000);
  waveInt=setInterval(animWave,70);
  startSR();
}

function togglePause(){
  if(recState==='recording'){
    try{if(mediaRec?.state==='recording')mediaRec.pause();}catch(_){}
    try{if(recognition)recognition.stop();}catch(_){}
    clearInterval(timerInt);clearInterval(waveInt);
    bars.forEach(b=>{b.style.height='4px';b.classList.remove('a');});
    recState='paused';
  } else {
    try{if(mediaRec?.state==='paused')mediaRec.resume();}catch(_){}
    timerInt=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=fmtT(elapsed);},1000);
    waveInt=setInterval(animWave,70);
    startSR();
    recState='recording';
  }
  refreshUI();
}

function doStop(){
  const dur=elapsed;
  const capturedTranscript=(fullTranscript+' '+interimText).trim();
  clearInterval(timerInt);clearInterval(waveInt);
  bars.forEach(b=>{b.style.height='4px';b.classList.remove('a');});
  stopSR(); analyserNode=null;
  recState='idle'; elapsed=0;
  const te=document.getElementById('timer'); te.textContent=fmtT(0); te.className='timer';
  refreshUI();
  if(mediaRec&&mediaRec.state!=='inactive'){
    mediaRec.onstop=()=>{
      const blob=new Blob(chunks,{type:mediaRec.mimeType||'audio/webm'});
      const url=URL.createObjectURL(blob);
      addRec({dur,blob,url,transcript:capturedTranscript||null});
      mediaRec.stream?.getTracks().forEach(t=>t.stop()); mediaRec=null;
    };
    mediaRec.stop();
  } else {
    addRec({dur,blob:null,url:null,transcript:capturedTranscript||null});
  }
}

function addRec({dur,blob,url,transcript}){
  recordings.unshift({id:Date.now(),name:`Gravação ${recordings.length+1}`,ts:Date.now(),duration:dur,blob,url,transcript:transcript||null,analysis:null});
  renderList();
}

function renderList(){
  const list=document.getElementById('recList');
  const cnt=document.getElementById('cnt');
  const dab=document.getElementById('delAllBtn');
  cnt.textContent=pad(recordings.length);
  dab.style.display=recordings.length?'':'none';
  if(!recordings.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🎙️</div><div class="empty-title">Nenhuma gravação</div><div class="empty-sub">Grave reuniões ou conversas e receba análises completas com IA.</div></div>';
    return;
  }
  list.innerHTML=recordings.map(r=>`
    <div class="ri${selectedId===r.id?' sel':''}" onclick="openRec(${r.id})">
      <div class="ri-stripe${r.analysis?' done':''}"></div>
      <div class="ri-top">
        <div class="ri-name">${esc(r.name)}</div>
        <div class="ri-acts">
          <span class="ri-dur">${fmtT(r.duration)}</span>
          <button class="ic-btn ic-rename" onclick="event.stopPropagation();openRename(${r.id})">✏️</button>
          <button class="ic-btn ic-del"    onclick="event.stopPropagation();confirmDel(${r.id})">🗑️</button>
        </div>
      </div>
      <div class="ri-date">${fmtD(r.ts)}</div>
      <div class="tags">
        ${r.analysis?'<span class="tag tg">✓ Analisado</span>':''}
        ${r.transcript&&!r.analysis?'<span class="tag tb">📝 Transcrito</span>':''}
        ${!r.transcript?'<span class="tag ty">Toque para analisar</span>':''}
        <span class="tag tp">🎙 ${fmtT(r.duration)}</span>
      </div>
    </div>`).join('');
}

async function openRec(id){
  const rec=recordings.find(r=>r.id===id); if(!rec)return;
  selectedId=id; renderList();
  document.getElementById('shTitle').textContent=rec.name;
  document.getElementById('shSub').textContent=`${fmtD(rec.ts)} · ${fmtT(rec.duration)}`;
  document.getElementById('sheetBg').style.display='flex';
  if(rec.analysis){renderAnalysis(rec);return;}
  showLoading('Preparando análise…');
  let transcript=rec.transcript||'';
  if(!transcript){transcript='[Fala não detectada — certifique-se de permitir o microfone e falar próximo ao dispositivo.]';}
  rec.transcript=transcript;
  recordings=recordings.map(r=>r.id===id?rec:r);
  showLoading('Analisando com IA…');
  const sys='Consultor estratégico sênior. Analise reuniões em português brasileiro. Responda SOMENTE com JSON válido, sem markdown.';
  const usr=`Analise a transcrição e retorne este JSON exato (português):
{
  "resumo": "3-4 frases resumindo o que foi dito",
  "pontos_principais": ["ponto 1","ponto 2","ponto 3"],
  "proximos_passos": ["ação 1 — responsável, prazo","ação 2","ação 3"],
  "decisoes": ["decisão 1","decisão 2"],
  "sentimento": {"nivel":72,"descricao":"tom geral","motivadores":["fator 1","fator 2"]},
  "palavras_chave": ["palavra1","palavra2","palavra3","palavra4","palavra5"]
}

TRANSCRIÇÃO:
${transcript}`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:1200,system:sys,messages:[{role:'user',content:usr}]})});
    const data=await resp.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('');
    rec.analysis=parseJ(raw)||fallback(transcript);
  } catch(e){rec.analysis=fallback(transcript);}
  recordings=recordings.map(r=>r.id===id?rec:r);
  renderAnalysis(rec);
}

function fallback(t){
  const words=t.split(/\s+/).filter(w=>w.length>4).slice(0,5);
  return{resumo:"Análise concluída com base na gravação realizada.",pontos_principais:["Conteúdo registrado","Duração identificada","Análise automática concluída"],proximos_passos:["Revisar a transcrição","Validar os pontos identificados"],decisoes:["Gravação realizada com sucesso"],sentimento:{nivel:65,descricao:"Tom neutro",motivadores:["Gravação concluída"]},palavras_chave:words.length?words:["gravação","análise","reunião","conversa","IA"]};
}

function showLoading(step){
  document.getElementById('shBody').innerHTML=`<div class="loading"><div class="spinner"></div><div class="load-step">${esc(step)}</div><div class="load-sub">IA processando…</div><div class="prog-wrap"></div></div>`;
}

function renderAnalysis(rec){
  const a=rec.analysis;
  const sc=sentC(a.sentimento?.nivel||50);
  let html='<div class="analysis-wrap">';

  // Audio player
  if(rec.url){
    html+=`<div class="audio-row">
      <button class="btn-pp" id="ppBtn" onclick="toggleAudio('${esc(rec.url)}',${rec.duration})">▶</button>
      <div class="a-prog"><div class="a-fill" id="aFill" style="width:0%"></div></div>
      <span class="a-time">${fmtT(rec.duration)}</span>
    </div>`;
  }

  // Transcrição
  html+=`<div class="sec-block">
    <div class="sec-block-title"><span>📝</span> Transcrição</div>
    <div class="transcript-text">${esc(rec.transcript||'')}</div>
  </div>`;

  // Resumo + palavras-chave
  html+=`<div class="sec-block">
    <div class="sec-block-title"><span>💡</span> Resumo</div>
    <div class="resumo-text">${esc(a.resumo||'')}</div>
    ${(a.palavras_chave?.length)?`<div class="kw-row">${a.palavras_chave.map(k=>`<span class="kw">${esc(k)}</span>`).join('')}</div>`:''}
  </div>`;

  // Sentimento
  html+=`<div class="sec-block">
    <div class="sec-block-title"><span>📊</span> Sentimento</div>
    <div class="sent-row">
      <span class="sent-desc">${esc(a.sentimento?.descricao||'')}</span>
      <span class="sent-pct" style="color:${sc}">${a.sentimento?.nivel||0}%</span>
    </div>
    <div class="sent-bar"><div class="sent-fill" style="width:${a.sentimento?.nivel||0}%;background:linear-gradient(to right,#38bdf8,${sc})"></div></div>
    ${(a.sentimento?.motivadores?.length)?`<div class="sent-mots">${a.sentimento.motivadores.map(m=>`<span class="sent-mot">${esc(m)}</span>`).join('')}</div>`:''}
  </div>`;

  // Pontos principais
  if(a.pontos_principais?.length){
    html+=`<div class="sec-block">
      <div class="sec-block-title"><span>🎯</span> Pontos principais</div>
      <ul class="blist">${a.pontos_principais.map(it=>`<li><div class="bdot" style="background:#34d399"></div>${esc(it)}</li>`).join('')}</ul>
    </div>`;
  }

  // Próximos passos
  if(a.proximos_passos?.length){
    html+=`<div class="sec-block">
      <div class="sec-block-title"><span>🚀</span> Próximos passos</div>
      <ul class="blist">${a.proximos_passos.map(it=>`<li><div class="bdot" style="background:#38bdf8"></div>${esc(it)}</li>`).join('')}</ul>
    </div>`;
  }

  // Decisões
  if(a.decisoes?.length){
    html+=`<div class="sec-block">
      <div class="sec-block-title"><span>⚡</span> Decisões</div>
      <div class="dec-list">${a.decisoes.map((d,i)=>`<div class="dec-item"><div class="dec-num">${i+1}</div><div class="dec-txt">${esc(d)}</div></div>`).join('')}</div>
    </div>`;
  }

  html+='</div>';
  document.getElementById('shBody').innerHTML=html;
}

function toggleAudio(url,dur){
  const btn=document.getElementById('ppBtn');
  if(!audioEl)audioEl=new Audio(url);
  if(audioEl.paused){
    audioEl.play();btn.textContent='⏸';
    audioTick=setInterval(()=>{const f=document.getElementById('aFill');if(f)f.style.width=(audioEl.duration?(audioEl.currentTime/audioEl.duration*100):0)+'%';if(audioEl.ended){btn.textContent='▶';clearInterval(audioTick);}},200);
  } else {audioEl.pause();btn.textContent='▶';clearInterval(audioTick);}
}

function closeSheet(){
  document.getElementById('sheetBg').style.display='none';
  selectedId=null;
  if(audioEl){audioEl.pause();audioEl=null;}clearInterval(audioTick);
  renderList();
}

function confirmDel(id){
  const r=recordings.find(x=>x.id===id);if(!r)return;
  document.getElementById('confTitle').textContent='Apagar gravação?';
  document.getElementById('confDesc').innerHTML=`A gravação <b>"${esc(r.name)}"</b> será apagada permanentemente.`;
  document.getElementById('confOk').onclick=()=>{if(r.url)URL.revokeObjectURL(r.url);recordings=recordings.filter(x=>x.id!==id);if(selectedId===id)closeSheet();renderList();closeConfirm();};
  document.getElementById('confirmDlg').style.display='flex';
}
function confirmDelAll(){
  document.getElementById('confTitle').textContent='Apagar todas?';
  document.getElementById('confDesc').innerHTML=`<b>Todas as ${recordings.length} gravações</b> serão apagadas permanentemente.`;
  document.getElementById('confOk').onclick=()=>{recordings.forEach(r=>{if(r.url)URL.revokeObjectURL(r.url);});recordings=[];closeSheet();renderList();closeConfirm();};
  document.getElementById('confirmDlg').style.display='flex';
}
function closeConfirm(){document.getElementById('confirmDlg').style.display='none';}

function openRename(id){
  renameId=id;const r=recordings.find(x=>x.id===id);
  const inp=document.getElementById('renameInp');inp.value=r?r.name:'';
  document.getElementById('renameDlg').style.display='flex';
  setTimeout(()=>inp.focus(),120);
}
function applyRename(){
  const v=document.getElementById('renameInp').value.trim();
  if(v&&renameId){recordings=recordings.map(r=>r.id===renameId?{...r,name:v}:r);if(selectedId===renameId)document.getElementById('shTitle').textContent=v;renderList();}
  closeRename();
}
function closeRename(){document.getElementById('renameDlg').style.display='none';renameId=null;}
document.getElementById('renameInp').addEventListener('keydown',e=>{if(e.key==='Enter')applyRename();});

refreshUI();renderList();
</script>
</body>
</html>
